<div class="app">

    <div id="finance-view">

<script>
  // Was hardcoded sample data — now loaded live from the database via
  // loadFinances() below, which calls /api/summary (see server.py).
  let purchases = [];

  const rowsEl = document.getElementById('rows');
  function render(){
    rowsEl.innerHTML = purchases.length
      ? purchases.map(p => `
        <div class="row">
          <div class="date">${p.date}</div>
          <div class="place">${p.place}<small>${p.sub}</small></div>
          <div class="amt">$${p.amt.toFixed(2)}</div>
        </div>
      `).join('')
      : '<div class="row"><span class="label">No receipts scanned yet</span></div>';
  }
  render();

  function fmtDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    if (isNaN(d)) return iso;
    return d.toLocaleDateString(undefined, { month: 'short', day: '2-digit' });
  }

  async function loadFinances() {
    try {
      const res = await fetch('/api/summary');
      const data = await res.json();

      document.getElementById('stat-month').textContent =
        `$${(data.this_month_total ?? 0).toFixed(2)}`;
      document.getElementById('stat-receipts').textContent =
        data.receipt_count ?? 0;
      document.getElementById('stat-avg').textContent =
        `$${(data.avg_per_trip ?? 0).toFixed(2)}`;

      purchases = (data.transactions || []).map(t => ({
        date: fmtDate(t.receipt_date || t.date),
        place: t.merchant || t.description || 'Unknown',
        sub: t.category || '',
        amt: Math.abs(t.amount || 0),
      }));
      render();
      loadRoast(purchases);
    } catch (err) {
      console.error('Could not load finances:', err);
      render();
    }
  }

  //const GOOGLE_API_KEY = "AQ.Ab8RN6J-EkCZWCxpQklhkJYaD7Y5GrxrY3F7FI54RzAgjWSgew"; // Hehe, our funny API key isnt here, dont touch it or anything!

  async function loadRoast(purchases) {
    const lines = purchases.map(p => `- ${p.date}: ${p.place} (${p.sub}) — $${p.amt.toFixed(2)}`).join('\n');
    const prompt = `You're a sterotypical "finance bro" who loves talking about making money.  Your job is to look at the most recent purchases and
    critique what the user has bought.  Specifically, you should talk about how much they could have made if they invested into yesterdays most profitable stock. 
    Keep it short (1-2 sentences), playful, not mean-spirited, no profanity. Here are their recent purchases:\n\n${lines}\n\nWrite the roast:`;

    try {
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${GOOGLE_API_KEY}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }]
          })
        }
      );
      const data = await res.json();
      if (data.error) {
        console.error('Gemini API error:', data.error);
        document.getElementById('roast-text').textContent = `API error: ${data.error.message}`;
        return;
      }
      const text = data.candidates?.[0]?.content?.parts?.[0]?.text?.trim();
      document.getElementById('roast-text').textContent = text || "Couldn't think of anything mean enough.";
    } catch (err) {
      document.getElementById('roast-text').textContent = "Couldn't reach the roast machine.";
    }
  }

  loadFinances();

  const tabs = document.querySelectorAll('nav button');
  tabs.forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.dataset.view === 'upload-view') {
        window.location.href = 'index.html';
        return;
      }
      tabs.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });
</script>
