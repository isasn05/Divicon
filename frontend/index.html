<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Scanner Camera Test</title>
<style>
  :root {
    --bg: #E9C9EA; --fg: #241226; --dim: #8B7690;
    --accent: #7A3B94; --err: #B4432F; --ok: #3E7A4F;
    --paper: #FBF6FC; --line: #E4D3E8;
    --mono: ui-monospace, "SF Mono", "Cascadia Mono", monospace;
  }
  * { box-sizing: border-box; margin: 0; }
  body { background: var(--bg); color: var(--fg); font-family: var(--mono);
         display: flex; flex-direction: column; align-items: center;
         min-height: 100vh; padding: 1rem; }
  h1 { font-size: 1rem; color: var(--dim); margin-bottom: 1rem;
       letter-spacing: 0.1em; text-transform: uppercase; }

  .topbar { width: 100%; max-width: 480px; display: flex; align-items: center;
            margin-bottom: 0.75rem; }
  .back-link { display: inline-flex; align-items: center; gap: 0.4rem;
               color: var(--dim); font-family: var(--mono); font-size: 0.75rem;
               text-decoration: none; padding: 0.4rem 0.8rem; border-radius: 999px;
               border: 1px solid var(--line); transition: color 0.15s, border-color 0.15s; }
  .back-link:hover { color: var(--fg); border-color: var(--dim); }
  .back-link:focus-visible { outline: 3px solid var(--fg); outline-offset: 2px; }

  /* ---- viewfinder ---- */
  .viewfinder {
    position: relative; width: 100%; max-width: 480px;
    aspect-ratio: 3/4; border-radius: 10px; overflow: hidden;
    background: var(--paper); border: 1px solid var(--line);
  }
  video { width: 100%; height: 100%; object-fit: cover; }
  .guide {
    position: absolute; inset: 6% 10%;
    border: 2px dashed var(--accent); border-radius: 6px;
    opacity: 0.55; pointer-events: none;
  }
  .guide::after {
    content: "align receipt here";
    position: absolute; bottom: -1.6rem; left: 50%;
    transform: translateX(-50%); font-size: 0.65rem;
    color: var(--accent); white-space: nowrap;
  }

  /* when preview is shown, hide the guide */
  .viewfinder.has-preview .guide { display: none; }
  .preview-img { width: 100%; height: 100%; object-fit: contain; display: none; }
  .viewfinder.has-preview video { display: none; }
  .viewfinder.has-preview .preview-img { display: block; }

  canvas { display: none; }

  /* ---- controls ---- */
  .controls { display: flex; flex-wrap: wrap; gap: 0.6rem;
              justify-content: center; margin-top: 1rem; }
  button {
    font-family: var(--mono); font-size: 0.85rem; font-weight: 600;
    border: none; border-radius: 999px; padding: 0.75rem 1.8rem;
    cursor: pointer; transition: filter 0.15s;
  }
  button:hover { filter: brightness(1.1); }
  button:disabled { opacity: 0.4; cursor: wait; }
  button:focus-visible { outline: 3px solid var(--fg); outline-offset: 2px; }

  .btn-capture { background: var(--accent); color: var(--paper); }
  .btn-retake  { background: var(--line); color: var(--fg); }
  .btn-switch  { background: var(--paper); border: 1px solid var(--line); color: var(--dim); font-size: 0.75rem; padding: 0.5rem 1.2rem; }

  .upload-lbl { color: var(--dim); font-size: 0.75rem; text-decoration: underline;
                cursor: pointer; margin-top: 0.3rem; }
  .upload-lbl input { position: absolute; width: 1px; height: 1px; opacity: 0; }

  #status { text-align: center; color: var(--dim); font-size: 0.8rem;
            margin-top: 0.8rem; max-width: 480px; line-height: 1.5; }
  #status.err { color: var(--err); }

  /* ---- results ---- */
  #results { width: 100%; max-width: 480px; margin-top: 1.5rem; }
  .result-box {
    background: var(--paper); border: 1px solid var(--line); border-radius: 8px; padding: 1rem 1.2rem;
    margin-bottom: 1rem; font-size: 0.82rem; line-height: 1.6;
  }
  .result-box h2 { font-size: 0.75rem; color: var(--accent);
                    text-transform: uppercase; letter-spacing: 0.08em;
                    margin-bottom: 0.6rem; }
  .row { display: flex; justify-content: space-between; }
  .row .label { color: var(--dim); }
  .items { border-top: 1px dashed var(--line); border-bottom: 1px dashed var(--line);
           padding: 0.4rem 0; margin: 0.4rem 0; }
  .conf-high   { color: var(--ok); }
  .conf-medium { color: #B4791F; }
  .conf-low    { color: var(--err); }
  .raw-text { white-space: pre-wrap; color: var(--dim); font-size: 0.75rem;
              max-height: 200px; overflow-y: auto; }
  .json-dump { white-space: pre-wrap; color: var(--dim); font-size: 0.7rem;
               max-height: 300px; overflow-y: auto; }
</style>
</head>
<body>

<div class="topbar">
  <a class="back-link" href="finances.html">&larr; finances</a>
</div>

<h1>scanner camera test</h1>

<div class="viewfinder" id="viewfinder">
  <video id="video" playsinline muted></video>
  <img class="preview-img" id="preview" alt="captured frame" />
  <div class="guide"></div>
</div>
<canvas id="canvas"></canvas>

<div class="controls">
  <button class="btn-capture" id="btn-capture">Capture</button>
  <button class="btn-retake"  id="btn-retake" hidden>Retake</button>
  <button class="btn-switch"  id="btn-switch" title="Toggle front/rear camera">⟲ flip</button>
</div>
<label class="upload-lbl">
  or upload a photo
  <input type="file" id="file-input" accept="image/*" capture="environment" />
</label>

<p id="status">Requesting camera…</p>
<div id="results"></div>

<script>
// ============================================================ camera.js
const video     = document.getElementById("video");
const canvas    = document.getElementById("canvas");
const preview   = document.getElementById("preview");
const vf        = document.getElementById("viewfinder");
const btnCap    = document.getElementById("btn-capture");
const btnRetake = document.getElementById("btn-retake");
const btnSwitch = document.getElementById("btn-switch");
const fileInput = document.getElementById("file-input");
const statusEl  = document.getElementById("status");
const resultsEl = document.getElementById("results");

let stream        = null;
let facingMode    = "environment";   // start with rear camera

// ----------------------------------------------------- camera lifecycle
async function startCamera() {
  stopCamera();
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode,
        width:  { ideal: 1920 },
        height: { ideal: 1080 },
      },
      audio: false,
    });
    video.srcObject = stream;
    await video.play();
    setStatus("Line the receipt up inside the guide, then capture.");
    vf.classList.remove("has-preview");
  } catch (err) {
    handleCameraError(err);
  }
}

function stopCamera() {
  if (stream) {
    stream.getTracks().forEach(t => t.stop());
    stream = null;
  }
}

function handleCameraError(err) {
  const map = {
    NotAllowedError:  "Camera permission denied. Allow it in browser settings, or upload a photo.",
    NotFoundError:    "No camera found. Upload a photo instead.",
    NotReadableError: "Camera in use by another app. Close it and reload.",
    OverconstrainedError: "Requested camera unavailable. Trying the other one…",
  };
  if (err.name === "OverconstrainedError") {
    facingMode = facingMode === "environment" ? "user" : "environment";
    startCamera();
    return;
  }
  setStatus(map[err.name] || `Camera error: ${err.message}`, true);
}

// ----------------------------------------------------- capture / retake
btnCap.addEventListener("click", () => {
  if (!stream) return;
  canvas.width  = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext("2d").drawImage(video, 0, 0);

  const dataUrl = canvas.toDataURL("image/jpeg", 0.92);
  preview.src = dataUrl;
  vf.classList.add("has-preview");
  stopCamera();

  sendToScanner(dataUrl);
});

btnRetake.addEventListener("click", () => {
  resultsEl.innerHTML = "";
  btnRetake.hidden = true;
  btnCap.hidden    = false;
  startCamera();
});

btnSwitch.addEventListener("click", () => {
  facingMode = facingMode === "environment" ? "user" : "environment";
  startCamera();
});

// ----------------------------------------------------- file upload fallback
fileInput.addEventListener("change", () => {
  const file = fileInput.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    preview.src = reader.result;
    vf.classList.add("has-preview");
    stopCamera();
    sendToScanner(reader.result);
  };
  reader.readAsDataURL(file);
});

    btnCap.disabled  = false;

function setStatus(msg, isErr = false) {
  statusEl.textContent = msg;
  statusEl.classList.toggle("err", isErr);
}

function esc(s) {
  const d = document.createElement("div");

</html>
